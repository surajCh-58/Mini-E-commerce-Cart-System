<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .delete-box { max-width: 400px; margin: 100px auto; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="delete-box bg-white text-center">
        <h4 class="mb-4">Are you sure?</h4>
        <p class="text-muted">You are about to delete the following product:</p>
        
        <div class="card mb-4 border-0 bg-light">
            <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text">
                    <strong>Price:</strong> ${{ product.price }} <br>
                    <strong>Category:</strong> {{ product.category }}
                </p>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
                <a href="{% url 'allproduct' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
