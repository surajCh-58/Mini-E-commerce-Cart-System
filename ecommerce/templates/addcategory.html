<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if form.instance.pk %}Edit Category{% else %}Add Category{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container { max-width: 500px; margin: 60px auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="form-container bg-white">
        <h3 class="mb-4 text-center">{% if form.instance.pk %}Update{% else %}Add New{% endif %} Category</h3>
        
        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="mb-3">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">
                        {% for error in field.errors %}{{ error }}{% endfor %}
                    </div>
                {% endif %}
            </div>
            {% endfor %}
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary">
                    {% if form.instance.pk %}Update Category{% else %}Save Category{% endif %}
                </button>
                <a href="{% url 'allcategory' %}" class="btn btn-link mt-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
